name: security

# Three scanners that complement CodeQL:
#   * govulncheck — known CVEs in the Go module graph + stdlib
#   * gosec       — Go-specific security linter (weak crypto, unsafe perms, …)
#   * gitleaks    — secret-detection over working tree AND git history
#
# All upload SARIF to the repo's Security tab so triage lives next to
# CodeQL findings.
#
# A fourth job, dependency-review, runs on PRs and blocks merges that
# introduce a vulnerable transitive dep.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily — vuln.go.dev publishes new CVEs continuously, so a weekly
    # cadence would let an issue sit a week before alerting.
    - cron: '23 5 * * *'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: run govulncheck
        # Plain-text output for the run log, exit non-zero on finding.
        # We deliberately do NOT emit SARIF: govulncheck's SARIF output
        # has duplicate strings in rule `properties.tags` which the
        # CodeQL upload validator rejects per the spec
        # (golang/go#67586). The vuln database is small enough that
        # operators can read findings directly from the action log.
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: run gosec
        # Pinned by version tag; the action's image carries gosec itself.
        # SARIF output integrates with the Security tab.
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'
      - name: upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif
          category: gosec

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the secret scan catches anything in past
          # commits, not just the working tree.
          fetch-depth: 0

      # Run the gitleaks CLI directly. The action wrapper
      # (gitleaks/gitleaks-action) moved to a paid licence for
      # organisation-owned repos in 2024; the underlying binary is
      # still MIT-licensed and works the same way. Install + invoke
      # it ourselves.
      - name: install gitleaks
        run: |
          version="8.21.2"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: scan working tree
        run: gitleaks detect --source . --no-banner --redact --verbose --report-format sarif --report-path gitleaks.sarif

      - name: upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  dependency-review:
    name: dependency-review (PRs only)
    # Action needs a base ref to diff against; pushes to main don't have one.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce a moderate-or-higher severity CVE
          # via a new or upgraded transitive dep.
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
