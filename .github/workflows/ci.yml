name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: vet
        run: go vet ./...
      - name: test
        env:
          CGO_ENABLED: '0'
        run: go test -race=false -timeout 60s ./...
      - name: build
        env:
          CGO_ENABLED: '0'
        run: go build ./cmd/rt-node-agent
